<!DOCTYPE html>
<html>
<head>
  <title>2048 Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>2048 Game</h1>
  <h2 id="score">Score: 0</h2>

  <div id="container">
    <!-- LEFT: Help -->
    <div id="help">
      <h3>How to Play</h3>
      <p>Use <b>Arrow Keys</b> (↑ ↓ ← →) on your keyboard.</p>
      <p>Merge same numbers to grow tiles.</p>
      <p>Reach <b>2048</b> to win.</p>
    </div>

    <!-- RIGHT: Game -->
    <div id="grid"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
